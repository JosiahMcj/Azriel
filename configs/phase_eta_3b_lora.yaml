# Mini-recipe LoRA config for Qwen3.6-35B-A3B base.
#
# Used by: scripts/67_eta_3b_lora_train.sh (passed via mlx_lm.lora -c)
# Output: ~/.azriel/checkpoints/lora-azriel-v0.8.0-pre2/
#
# Differences from the prior recipe:
# - data: data/lora_eta3b (presplit to <=1024 tokens; no records get
# truncated mid-sentence -- root cause of attempt 5 degenerate output)
# - num_layers: 16 (back to the spec; the prior attempt was forced to 8)
# - everything else identical to the prior recipe

# Model + data
model: "~/.azriel/checkpoints/qwen3.6-35b-a3b-mlx-4bit"
data: "~/.azriel/data/lora_eta3b"
adapter_path: "~/.azriel/checkpoints/lora-azriel-v0.8.0-pre2"

# Training type + recipe
fine_tune_type: lora
train: true

# Recipe: rank=16, lr=1e-4, 30 iters, batch=1
num_layers: 16
batch_size: 1
iters: 30
learning_rate: 1.0e-4

# Evaluation cadence (small ratio; the run is only 30 iters)
val_batches: 5
steps_per_eval: 30
steps_per_report: 5
save_every: 30

# Sequence length matches the presplit budget. With the corpus pre-chunked
# at paragraph/sentence boundaries, no record is truncated -- the model
# never sees a half-finished assistant turn.
max_seq_length: 1024

# LoRA-specific knobs (rank lives here, not in --num-layers)
lora_parameters:
  rank: 16
  scale: 20.0
  dropout: 0.0
